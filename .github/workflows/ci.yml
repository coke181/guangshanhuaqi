# CI workflow:
# Installs Qt on Windows, configures the CMake project, and runs the full CTest suite.

name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  windows-qt:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      QT_VERSION: 6.10.0
      QT_ROOT: ${{ github.workspace }}\Qt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          dir: ${{ env.QT_ROOT }}
          cache: true

      - name: Configure
        shell: powershell
        run: |
          $qtPrefix = Join-Path $env:QT_ROOT "${env:QT_VERSION}\msvc2022_64"
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTING=ON "-DCMAKE_PREFIX_PATH=$qtPrefix"

      - name: Build
        shell: powershell
        run: cmake --build build --config Debug

      - name: Test
        shell: powershell
        run: ctest --test-dir build -C Debug --output-on-failure
